@if (currentUser) {
  <div class="container mt-4">
    <h4>Profil</h4>
    <div class="card mt-3">
      <div class="card-body">
        <p><strong>Korisničko ime:</strong> {{ currentUser.username }}</p>
        <p><strong>Email:</strong> {{ currentUser.email }}</p>
        <p><strong>Uloge:</strong> {{ currentUser.roles?.join(', ') }}</p>
      </div>
    </div>
    <a routerLink="/home" class="btn btn-primary mt-3">Moje sobe</a>
  </div>
} @else {
  <div class="container mt-4">
    Molimo prijavite se.
  </div>
}
